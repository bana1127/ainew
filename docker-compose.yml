services:
  db:
    image: postgres:16-alpine
    container_name: clubagent-db
    environment:
      POSTGRES_USER: clubagent
      POSTGRES_PASSWORD: clubagent
      POSTGRES_DB: clubagent
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clubagent -d clubagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    profiles: ["app"]
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://clubagent:clubagent@db:5432/clubagent
      BACKEND_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    profiles: ["app"]
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
